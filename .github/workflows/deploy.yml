name: 🚀 Build & Deploy
on:
  push:
    branches: [main, master]
  workflow_dispatch:
env:
  DOCKER_REPO: my-websites
  APP_NAME: sre-agent
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}
          tags: |
            type=raw,value=${{ env.APP_NAME }}-latest
            type=raw,value=${{ env.APP_NAME }}-${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"             -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"             -H "Content-Type: application/json" -d '{"clearCache": "do_not_clear"}'
          else
            echo "Skipping deploy: RENDER_SERVICE_ID not set"
          fi
